---
- name: Install Zabbix Agent 2 on Windows
  hosts: windows_servers
  gather_facts: true

  vars:
    zabbix_server: "192.168.1.172"
    zabbix_server_active: "192.168.1.172"
    zabbix_hostname: "{{ inventory_hostname }}"
    zabbix_agent_version: "7.4.12"
    zabbix_msi_url: "https://cdn.zabbix.com/zabbix/binaries/stable/{{ zabbix_agent_version[:3] }}/{{ zabbix_agent_version }}/zabbix_agent2-{{ zabbix_agent_version }}-windows-amd64-openssl.msi"
    download_dir: "C:\\Users\\{{ ansible_user }}\\Downloads"
    msi_filename: "zabbix_agent2-{{ zabbix_agent_version }}-windows-amd64-openssl.msi"
    msi_full_path: "{{ download_dir }}\\{{ msi_filename }}"
    agent_dir: "C:\\Program Files\\Zabbix Agent 2"
    service_name: "Zabbix Agent 2"

  tasks:
    # ================================================================
    # 1. Очистка старой службы
    # ================================================================
    - name: Check if Zabbix Agent 2 service exists
      ansible.windows.win_service:
        name: "{{ service_name }}"
      register: service_info
      ignore_errors: yes

    - name: Stop service if exists
      ansible.windows.win_service:
        name: "{{ service_name }}"
        state: stopped
      when: service_info.exists
      ignore_errors: yes

    - name: Remove service via win_service
      ansible.windows.win_service:
        name: "{{ service_name }}"
        state: absent
      when: service_info.exists
      register: remove_attempt
      ignore_errors: yes

    - name: Force delete service via sc if needed
      ansible.windows.win_command: 'sc delete "{{ service_name }}"'
      when:
        - service_info.exists
        - remove_attempt is failed or not remove_attempt.changed
      ignore_errors: yes

    - name: Reboot if service existed (to clear pending delete)
      ansible.windows.win_reboot:
        reboot_timeout: 300
        post_reboot_delay: 30
      when: service_info.exists

    # ================================================================
    # 2. Скачивание и установка MSI
    # ================================================================
    - name: Ensure Downloads directory exists
      ansible.windows.win_file:
        path: "{{ download_dir }}"
        state: directory

    - name: Download Zabbix Agent 2 MSI
      ansible.windows.win_get_url:
        url: "{{ zabbix_msi_url }}"
        dest: "{{ msi_full_path }}"
        timeout: 300
        force: yes
      register: download_result

    - name: Debug download result
      debug:
        msg: "Download status: {{ download_result.msg | default('unknown') }}"

    - name: Check MSI file exists after download
      ansible.windows.win_stat:
        path: "{{ msi_full_path }}"
      register: msi_stat

    - name: Fail if MSI not downloaded
      fail:
        msg: "MSI file not found at {{ msi_full_path }}. Download may have failed."
      when: not msi_stat.stat.exists or msi_stat.stat.size == 0

    - name: Debug MSI file size
      debug:
        msg: "MSI file size: {{ msi_stat.stat.size }} bytes"

    - name: Install Zabbix Agent 2 using win_package
      ansible.windows.win_package:
        path: "{{ msi_full_path }}"
        arguments:
          - "SERVER={{ zabbix_server }}"
          - "SERVERACTIVE={{ zabbix_server_active }}"
          - "HOSTNAME={{ zabbix_hostname }}"
          - "REBOOT=ReallySuppress"
          - "ALLUSERS=1"
        state: present
      register: install_result

    - name: Debug install result
      debug:
        msg: "Install changed: {{ install_result.changed | default('unknown') }}"

    # ================================================================
    # 3. Поиск zabbix_agent2.exe (MSI может ставить в другой путь)
    # ================================================================
    - name: Find zabbix_agent2.exe on the system
      ansible.windows.win_find:
        paths:
          - "C:\\Program Files"
          - "C:\\Program Files (x86)"
        patterns:
          - "zabbix_agent2.exe"
        recurse: yes
      register: find_result

    - name: Debug found exe paths
      debug:
        msg: "Found exe: {{ find_result.files | map(attribute='path') | list }}"

    - name: Fail if executable not found anywhere
      fail:
        msg: "zabbix_agent2.exe not found. Download URL: {{ zabbix_msi_url }}"
      when: find_result.files | length == 0

    - name: Set agent_dir to found path
      set_fact:
        agent_dir: "{{ find_result.files[0].path | dirname }}"

    # ================================================================
    # 4. Копирование конфигурации и скриптов
    # ================================================================
    - name: Ensure scripts directory exists
      ansible.windows.win_file:
        path: "{{ agent_dir }}\\scripts"
        state: directory

    - name: Copy zabbix_agent2.conf
      ansible.windows.win_copy:
        src: "{{ playbook_dir }}/Zabbix Agent 2/zabbix_agent2.conf"
        dest: "{{ agent_dir }}\\zabbix_agent2.conf"
        force: yes

    - name: Copy scripts folder contents
      ansible.windows.win_copy:
        src: "{{ playbook_dir }}/Zabbix Agent 2/scripts/"
        dest: "{{ agent_dir }}\\scripts"
        force: yes

    # ================================================================
    # 5. Создание/запуск службы
    # ================================================================
    - name: Check if service exists after installation
      ansible.windows.win_service:
        name: "{{ service_name }}"
      register: service_after_install
      ignore_errors: yes

    - name: Create service manually if not exists
      ansible.windows.win_service:
        name: "{{ service_name }}"
        path: "{{ agent_dir }}\\zabbix_agent2.exe"
        display_name: "Zabbix Agent 2"
        start_mode: auto
        state: present
      when: not service_after_install.exists
      register: service_creation
      ignore_errors: yes

    - name: Start service
      ansible.windows.win_service:
        name: "{{ service_name }}"
        state: started
      when: service_after_install.exists or (service_creation is defined and service_creation.changed)
      register: start_result
      ignore_errors: yes

    - name: If service failed to start, try via sc command
      ansible.windows.win_command: 'sc start "{{ service_name }}"'
      when: start_result is defined and start_result.failed
      ignore_errors: yes

    # ================================================================
    # 6. Финальная проверка
    # ================================================================
    - name: Check service status
      ansible.windows.win_service:
        name: "{{ service_name }}"
      register: service_status
      ignore_errors: yes

    - name: Show service state
      debug:
        msg: "Service state: {{ service_status.state | default('unknown') }}"

    - name: Fail if service is not running
      fail:
        msg: "Zabbix Agent 2 service is not running"
      when: service_status.state | default('stopped') != 'running'
