---
- name: Install Zabbix Agent 2 on Windows
  hosts: windows_servers
  gather_facts: true

  vars:
    zabbix_server: "192.168.1.172"
    zabbix_server_active: "192.168.1.172"
    zabbix_hostname: "{{ inventory_hostname }}"
    zabbix_agent_version: "7.4.12"
    zabbix_msi_url: "https://cdn.zabbix.com/zabbix/binaries/stable/{{ zabbix_agent_version[:3] }}/{{ zabbix_agent_version }}/zabbix_agent2-{{ zabbix_agent_version }}-windows-amd64-openssl.msi"
    download_dir: "C:\\Users\\{{ ansible_user }}\\Downloads"
    msi_filename: "zabbix_agent2-{{ zabbix_agent_version }}-windows-amd64-openssl.msi"
    msi_full_path: "{{ download_dir }}\\{{ msi_filename }}"
    agent_dir: "C:\\Program Files\\Zabbix Agent 2"

  tasks:
    # 1. Удаляем службу (если она существует), чтобы избежать проблем с "помечено на удаление"
    - name: Remove existing Zabbix Agent 2 service if present
      ansible.windows.win_service:
        name: "Zabbix Agent 2"
        state: absent
      ignore_errors: yes
      register: remove_service

    # 2. Удаляем старый каталог установки (если есть)
    - name: Delete old Zabbix Agent 2 directory
      ansible.windows.win_file:
        path: "{{ agent_dir }}"
        state: absent
      ignore_errors: yes

    # 3. Создаем папку для скачивания
    - name: Ensure Downloads directory exists
      ansible.windows.win_file:
        path: "{{ download_dir }}"
        state: directory

    # 4. Скачиваем MSI
    - name: Download Zabbix Agent 2 MSI
      ansible.windows.win_get_url:
        url: "{{ zabbix_msi_url }}"
        dest: "{{ msi_full_path }}"
        timeout: 60
        force: yes

    # 5. Устанавливаем MSI
    - name: Install Zabbix Agent 2 using win_package
      ansible.windows.win_package:
        path: "{{ msi_full_path }}"
        arguments:
          - "SERVER={{ zabbix_server }}"
          - "SERVERACTIVE={{ zabbix_server_active }}"
          - "HOSTNAME={{ zabbix_hostname }}"
          - "REBOOT=ReallySuppress"
          - "ALLUSERS=1"
        state: present
      register: install_result

    # 6. Копируем конфиг из репозитория (используйте win_copy, если файл локально доступен)
    - name: Copy zabbix_agent2.conf from repository
      ansible.windows.win_copy:
        src: "win/Zabbix Agent 2/zabbix_agent2.conf"
        dest: "{{ agent_dir }}\\zabbix_agent2.conf"
        force: yes
      register: config_download
      ignore_errors: yes

    # 7. Копируем скрипт get_metadata.bat
    - name: Copy get_metadata.bat from repository
      ansible.windows.win_copy:
        src: "win/Zabbix Agent 2/get_metadata.bat"
        dest: "{{ agent_dir }}\\scripts\\get_metadata.bat"
        force: yes
      register: script_download
      ignore_errors: yes

    # 8. Перезапускаем службу (если конфиг или скрипт изменились)
    - name: Restart Zabbix Agent 2 service
      ansible.windows.win_service:
        name: "Zabbix Agent 2"
        state: restarted
      when: (config_download is defined and config_download.changed) or
            (script_download is defined and script_download.changed)

    # 9. Проверяем состояние службы (безопасно)
    - name: Check service status
      ansible.windows.win_service:
        name: "Zabbix Agent 2"
      register: service_status

    # 10. Выводим состояние (с защитой от отсутствия поля state)
    - name: Show service state
      debug:
        msg: "Service state: {{ service_status.state | default('unknown') }}"

    # 11. Если служба не запущена – завершаем с ошибкой
    - name: Fail if service is not running
      fail:
        msg: "Zabbix Agent 2 service is not running"
      when: service_status.state | default('stopped') != 'running'