---
- name: Install Zabbix Agent 2 on Windows
  hosts: windows_servers
  gather_facts: true

  vars:
    # Адрес Zabbix-сервера (замените на свой)
    zabbix_agent_server: "192.168.1.172"          # ← обязательно
    zabbix_agent_server_active: ""   # если используется активный режим
    zabbix_agent_hostname: "{{ inventory_hostname }}"
    zabbix_agent_listenport: 10050
    zabbix_win_config_name: "zabbix_agent2.conf"

  tasks:
    - name: Install Zabbix Agent 2
      ansible.builtin.include_role:
        name: community.zabbix.zabbix_agent