---
- name: Install Zabbix Agent 2 on Windows
  hosts: windows_servers
  gather_facts: true

  vars:
    zabbix_agent_server: "192.168.1.172"
    zabbix_agent_server_active: "192.168.1.172"
    zabbix_agent_hostname: "{{ inventory_hostname }}"
    zabbix_win_config_name: "zabbix_agent2.conf"
    # Подавляем запрос перезагрузки
    zabbix_agent_win_install_options: "REBOOT=ReallySuppress"
    # Для отладки раскомментируйте строку ниже (с одинарными кавычками):
    zabbix_agent_win_install_options: '/lv* C:\zabbix_install.log REBOOT=ReallySuppress'

  tasks:
    - name: Install Zabbix Agent 2
      ansible.builtin.include_role:
        name: community.zabbix.zabbix_agent