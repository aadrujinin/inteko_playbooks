---
- name: Minimize windows immediately and schedule every minute
  hosts: windows_servers
  gather_facts: false

  vars:
    task_name: "MinimizeWindowsEveryMinute"
    task_user: "{{ ansible_user }}"
    task_password: "{{ ansible_password }}"

  tasks:
    # --- 1. Немедленная минимизация (тест) ---
    - name: Minimize all windows now (test)
      ansible.windows.win_shell: |
        (New-Object -ComObject Shell.Application).MinimizeAll()
      register: test_result
      ignore_errors: yes

    - name: Show test result
      debug:
        msg: "Test command executed. Check if windows minimized."

    # --- 2. Удалить старую задачу ---
    - name: Remove old scheduled task if exists
      ansible.windows.win_shell: |
        schtasks /Delete /TN "{{ task_name }}" /F
      ignore_errors: yes

    # --- 3. Создать новую задачу с правильным триггером ---
    - name: Create scheduled task (minimize every minute when user is logged on)
      ansible.windows.win_shell: |
        # Действие
        $action = New-ScheduledTaskAction -Execute "powershell.exe" -Argument "-NoProfile -WindowStyle Hidden -Command `"(New-Object -ComObject Shell.Application).MinimizeAll()`""
        
        # Триггер: при входе пользователя + повторение каждую минуту
        $trigger = New-ScheduledTaskTrigger -AtLogOn -User "{{ task_user }}"
        $trigger.Repetition = New-ScheduledTaskRepetition -Interval (New-TimeSpan -Minutes 1) -Duration (New-TimeSpan -Days 365)
        
        # Настройки (запускать, даже если питание от батарей)
        $settings = New-ScheduledTaskSettingsSet -AllowStartIfOnBatteries -DontStopIfGoingOnBatteries -StartWhenAvailable -Hidden
        
        # Регистрация
        Register-ScheduledTask -TaskName "{{ task_name }}" -Action $action -Trigger $trigger -Settings $settings -User "{{ task_user }}" -Password "{{ task_password }}" -RunLevel Highest -Force
        
        # Запустить сразу
        Start-ScheduledTask -TaskName "{{ task_name }}"
      register: task_result
      ignore_errors: yes

    - name: Show task creation result
      debug:
        msg: "{{ task_result.stdout_lines if task_result.stdout_lines else task_result.stderr_lines }}"