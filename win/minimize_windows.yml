---
- name: Schedule minimize windows every minute (working version)
  hosts: windows_servers
  gather_facts: false

  vars:
    task_name: "MinimizeWindowsEveryMinute"
    task_user: "tech6"                     # замените на вашего пользователя
    task_password: "Lhe;byby1985$"         # пароль пользователя

  tasks:
    - name: Remove old task if exists
      ansible.windows.win_shell: |
        Unregister-ScheduledTask -TaskName "{{ task_name }}" -Confirm:$false -ErrorAction SilentlyContinue
      ignore_errors: yes

    - name: Create scheduled task with logon trigger and repetition
      ansible.windows.win_shell: |
        $action = New-ScheduledTaskAction -Execute "powershell.exe" -Argument "-NoProfile -WindowStyle Hidden -Command `"(New-Object -ComObject Shell.Application).MinimizeAll()`""
        $trigger = New-ScheduledTaskTrigger -AtLogOn -User "{{ task_user }}"
        $trigger.Repetition = New-ScheduledTaskRepetition -Interval (New-TimeSpan -Minutes 1) -Duration (New-TimeSpan -Days 365)
        $settings = New-ScheduledTaskSettingsSet -AllowStartIfOnBatteries -DontStopIfGoingOnBatteries -StartWhenAvailable -Hidden
        Register-ScheduledTask -TaskName "{{ task_name }}" -Action $action -Trigger $trigger -Settings $settings -User "{{ task_user }}" -Password "{{ task_password }}" -RunLevel Highest
        Start-ScheduledTask -TaskName "{{ task_name }}"
      register: task_result
      ignore_errors: yes

    - name: Show result
      debug:
        msg: "{{ task_result.stdout_lines if task_result.stdout_lines else task_result.stderr_lines }}"