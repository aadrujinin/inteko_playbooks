---
- name: Schedule minimize windows every minute
  hosts: windows_servers
  gather_facts: false

  vars:
    task_name: "MinimizeWindowsEveryMinute"
    task_user: "tech6"                     # замените на вашего пользователя
    task_password: "Lhe;byby1985$"         # пароль пользователя

  tasks:
    - name: Create scheduled task via PowerShell
      ansible.windows.win_shell: |
        # Удаляем старую задачу, если есть
        $task = Get-ScheduledTask -TaskName "{{ task_name }}" -ErrorAction SilentlyContinue
        if ($task) {
            Unregister-ScheduledTask -TaskName "{{ task_name }}" -Confirm:$false
        }

        # Действие: запуск PowerShell с командой сворачивания всех окон
        $action = New-ScheduledTaskAction -Execute "powershell.exe" -Argument "-NoProfile -Command `"(New-Object -ComObject Shell.Application).MinimizeAll()`""

        # Триггер: однократный запуск через 1 минуту, с повторением каждую минуту в течение 365 дней
        $trigger = New-ScheduledTaskTrigger -Once -At (Get-Date).AddMinutes(1) -RepetitionInterval (New-TimeSpan -Minutes 1) -RepetitionDuration (New-TimeSpan -Days 365)

        # Настройки задачи
        $settings = New-ScheduledTaskSettingsSet -AllowStartIfOnBatteries -DontStopIfGoingOnBatteries -StartWhenAvailable -Hidden

        # Регистрация задачи
        Register-ScheduledTask -TaskName "{{ task_name }}" -Action $action -Trigger $trigger -Settings $settings -User "{{ task_user }}" -Password "{{ task_password }}" -RunLevel Highest

        # Немедленный запуск для проверки
        Start-ScheduledTask -TaskName "{{ task_name }}"
      register: task_result
      ignore_errors: yes

    - name: Show result
      debug:
        msg: "{{ task_result.stdout_lines if task_result.stdout_lines else task_result.stderr_lines }}"